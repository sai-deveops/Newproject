<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Movie Ticket Booking</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: Arial, sans-serif;
    }

    body{
      background:#111827;
      color:white;
      display:flex;
      justify-content:center;
      align-items:center;
      min-height:100vh;
      padding:20px;
    }

    .container{
      width:900px;
      background:#1f2937;
      border-radius:15px;
      padding:25px;
      box-shadow:0 0 20px rgba(0,0,0,0.5);
    }

    h1{
      text-align:center;
      margin-bottom:20px;
      color:#facc15;
    }

    .movie-selection{
      display:flex;
      justify-content:space-between;
      margin-bottom:25px;
      flex-wrap:wrap;
      gap:15px;
    }

    select, button{
      padding:10px 15px;
      border:none;
      border-radius:8px;
      font-size:16px;
    }

    select{
      width:250px;
    }

    .screen{
      background:#e5e7eb;
      height:70px;
      border-radius:10px;
      margin:20px 0 40px;
      transform:perspective(600px) rotateX(-20deg);
      box-shadow:0 5px 20px rgba(255,255,255,0.5);
    }

    .seat-container{
      display:grid;
      grid-template-columns: repeat(8, 1fr);
      gap:12px;
      justify-items:center;
    }

    .seat{
      width:40px;
      height:40px;
      background:#374151;
      border-radius:10px 10px 5px 5px;
      cursor:pointer;
      transition:0.3s;
    }

    .seat:hover{
      transform:scale(1.1);
    }

    .seat.selected{
      background:#22c55e;
    }

    .seat.occupied{
      background:#ef4444;
      cursor:not-allowed;
    }

    .legend{
      display:flex;
      justify-content:center;
      gap:20px;
      margin:25px 0;
    }

    .legend-item{
      display:flex;
      align-items:center;
      gap:8px;
    }

    .box{
      width:20px;
      height:20px;
      border-radius:5px;
    }

    .available{ background:#374151; }
    .selected-box{ background:#22c55e; }
    .occupied-box{ background:#ef4444; }

    .summary{
      text-align:center;
      margin-top:20px;
    }

    .summary p{
      margin:10px 0;
      font-size:18px;
    }

    button{
      background:#facc15;
      color:#111827;
      font-weight:bold;
      cursor:pointer;
      margin-top:15px;
      transition:0.3s;
    }

    button:hover{
      background:#fde047;
    }

    @media(max-width:700px){
      .seat-container{
        grid-template-columns: repeat(4, 1fr);
      }
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>🎬 Movie Ticket Booking</h1>

    <div class="movie-selection">
      <select id="movie">
        <option value="200">Avengers Endgame - ₹200</option>
        <option value="180">Jawan - ₹180</option>
        <option value="150">Leo - ₹150</option>
        <option value="220">Kalki 2898 AD - ₹220</option>
      </select>

      <button onclick="bookTickets()">Book Now</button>
    </div>

    <div class="screen"></div>

    <div class="seat-container" id="seatContainer"></div>

    <div class="legend">
      <div class="legend-item">
        <div class="box available"></div>
        <span>Available</span>
      </div>

      <div class="legend-item">
        <div class="box selected-box"></div>
        <span>Selected</span>
      </div>

      <div class="legend-item">
        <div class="box occupied-box"></div>
        <span>Occupied</span>
      </div>
    </div>

    <div class="summary">
      <p>Selected Seats: <span id="count">0</span></p>
      <p>Total Price: ₹<span id="total">0</span></p>
    </div>
  </div>

  <script>
    const seatContainer = document.getElementById("seatContainer");
    const count = document.getElementById("count");
    const total = document.getElementById("total");
    const movieSelect = document.getElementById("movie");

    const totalSeats = 48;

    // Create seats dynamically
    for(let i = 0; i < totalSeats; i++) {
      const seat = document.createElement("div");
      seat.classList.add("seat");

      // Random occupied seats
      if(Math.random() < 0.2){
        seat.classList.add("occupied");
      }

      seatContainer.appendChild(seat);
    }

    // Seat click event
    seatContainer.addEventListener("click", (e) => {
      if(
        e.target.classList.contains("seat") &&
        !e.target.classList.contains("occupied")
      ){
        e.target.classList.toggle("selected");
        updateSummary();
      }
    });

    // Update summary
    function updateSummary(){
      const selectedSeats =
        document.querySelectorAll(".seat.selected");

      const selectedCount = selectedSeats.length;
      const ticketPrice = +movieSelect.value;

      count.innerText = selectedCount;
      total.innerText = selectedCount * ticketPrice;
    }

    // Movie change updates total
    movieSelect.addEventListener("change", updateSummary);

    // Booking function
    function bookTickets(){
      const selectedSeats =
        document.querySelectorAll(".seat.selected");

      if(selectedSeats.length === 0){
        alert("Please select at least one seat.");
        return;
      }

      selectedSeats.forEach(seat => {
        seat.classList.remove("selected");
        seat.classList.add("occupied");
      });

      alert("Tickets booked successfully 🎉");
      updateSummary();
    }
  </script>

</body>
</html>
